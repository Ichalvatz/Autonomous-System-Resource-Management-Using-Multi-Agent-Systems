apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
data:
  script.js: |
    import http from 'k6/http';
    import { sleep } from 'k6';
    
    export const options = {
      stages: [
        { duration: '30s', target: 20 },   // Φάση 1: Ζέσταμα με 20 ταυτόχρονους χρήστες
        { duration: '2m', target: 300 },   // Φάση 2: Το μεγάλο Spike! 300 χρήστες ψάχνουν μανιωδώς
        { duration: '30s', target: 0 },    // Φάση 3: Επαναφορά στο φυσιολογικό
      ],
    };
    
    // Λίστα με πιθανές λέξεις αναζήτησης για να ζορίσουμε τη βάση
    const searchTerms = ['Athens', 'Paris', 'beach', 'museum', 'hotel', 'coffee', 'mountain', 'historic'];
    
    export default function () {
      // Διαλέγουμε μια τυχαία λέξη σε κάθε request
      const randomTerm = searchTerms[Math.floor(Math.random() * searchTerms.length)];
      
      // Χτυπάμε το εσωτερικό Service του Kubernetes
      const url = `http://aiops-backend-service:3001/places/search?keywords=${randomTerm}`;
      
      http.get(url);
      
      // Μικρή παύση 0.1s για ρεαλισμό
      sleep(0.1); 
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test
spec:
  # Διαγραφή του Job αν αποτύχει, ώστε να μπορούμε να το ξανατρέξουμε εύκολα
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: k6-load-test
    spec:
      containers:
      - name: k6
        image: grafana/k6:latest
        command: ["k6", "run", "/scripts/script.js"]
        volumeMounts:
        - name: script-volume
          mountPath: /scripts
      restartPolicy: Never
      volumes:
      - name: script-volume
        configMap:
          name: k6-script