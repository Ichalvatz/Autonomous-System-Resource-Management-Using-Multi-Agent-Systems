apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-backend
  template:
    metadata:
      labels:
        app: aiops-backend
    spec:
      containers:
      - name: aiops-backend-container
        image: aiops-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        env:
        - name: HOST
          value: "0.0.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-backend-service
spec:
  type: NodePort
  selector:
    app: aiops-backend
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30001