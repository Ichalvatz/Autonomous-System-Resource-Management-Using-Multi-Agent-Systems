apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-frontend
  template:
    metadata:
      labels:
        app: aiops-frontend
    spec:
      containers:
      - name: aiops-frontend-container
        image: aiops-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-frontend-service
spec:
  type: NodePort
  selector:
    app: aiops-frontend
  ports:
    - port: 8080
      targetPort: 80
      nodePort: 30002