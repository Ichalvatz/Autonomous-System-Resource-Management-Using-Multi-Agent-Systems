apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-backend
  template:
    metadata:
      labels:
        app: aiops-backend
    spec:
      containers:
      - name: aiops-backend-container
        image: aiops-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: USE_MONGODB
          value: "false"
        - name: JWT_SECRET
          value: "my-super-secret-key-for-aiops"
        - name: CORS_ORIGIN
          value: "*"
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-backend-service
spec:
  type: NodePort
  selector:
    app: aiops-backend
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
      nodePort: 30001
