      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [description]
              properties:
                description:
                  type: string
                  maxLength: 1000
                  description: "Detailed description of the incorrect information or issue found. HTML tags are automatically stripped for security. Maximum 1000 characters."
      responses:
        '201':
          description: "Report successfully submitted and will be reviewed by administrators"
          content:
            application/json:
              schema:
                type: object
                properties:
                  report:
                    $ref: "#/components/schemas/Report"
                  links:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/HypermediaLink"
                    description: "Available actions after submitting a report"
                    example:
                      place:
                        href: "/places/4321"
                        method: GET
                      user-profile:
                        href: "/users/16180/profile"
                        method: GET
        '400':
          description: "Bad request - Missing required fields"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: INVALID_REPORT_DATA
                message: "Description is required to submit a report"
                details:
                  field: description
                  value: ""
        '404':
          description: "Place not found - No place exists with the specified placeId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: PLACE_NOT_FOUND
                message: "Place with ID 4321 not found"
  /places/search:
    get:
      summary: "Search for places using keywords"
      operationId: performSearch
      description: |
        **FR19 - The user must be able to search for places using keywords.**

        Searches for places that match the provided keywords in their names or descriptions. Publicly accessible.
      tags: [Places]
      security: []
      parameters:
        - name: keywords
          in: query
          required: true
          schema:
            type: array
