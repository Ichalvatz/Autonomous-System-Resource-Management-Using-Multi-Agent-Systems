              type: string
          description: "Array of keywords to search for in place names, descriptions, and categories"
          example: [museum, art, history]
      responses:
        '200':
          description: "Successfully found places matching the search keywords. Includes search metadata."
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Place"
                        - type: object
                          properties:
                            links:
                              type: object
                              additionalProperties:
                                $ref: "#/components/schemas/HypermediaLink"
                              description: "Available actions for this search result"
                              example:
                                select:
                                  href: "/places/4321"
                                  method: GET
                  searchTerms:
                    type: array
                    items:
                      type: string
                    description: "The search keywords used in the query"
                    example: [museum, art]
                  totalResults:
                    type: integer
                    description: "Total number of results found"
                    example: 15
                  links:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/HypermediaLink"
                    description: "Available actions for search results"
                    example:
                      refine-search:
                        href: "/places/search{?keywords}"
                        method: GET
                      user-profile:
                        href: "/users/16180/profile"
                        method: GET
