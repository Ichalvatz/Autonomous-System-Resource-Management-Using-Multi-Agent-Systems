    post:
      summary: "Add a place to user's favourites"
      operationId: addFavouritePlace
      description: |
        **FR16 - The user must be able to add a place to their favorite places.**

        Adds a specific place to the user's collection of favorite places for easy future access. Returns the full place details including reviews, merged with the new favourite entry.
      tags: ["Favourite & Disliked Places"]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the user adding a place to their favorites"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [placeId]
              properties:
                placeId:
                  type: integer
                  description: "Unique identifier of the place to be added to the user's favorites"
      responses:
        '201':
          description: "Place successfully added to user's favorites collection. Returns the favourite with full place details merged (not nested)."
          content:
            application/json:
              schema:
                type: object
                properties:
                  favourite:
                    allOf:
                      - type: object
                        properties:
                          favouriteId:
                            type: integer
                            description: "Unique identifier for this favourite entry"
                            example: 789
                      - $ref: "#/components/schemas/Place"
                  links:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/HypermediaLink"
                    description: "Available actions for this favourite"
                    example:
                      self:
                        href: "/users/16180/favourite-places"
                        method: GET
                      remove:
                        href: "/users/16180/favourite-places/789"
                        method: DELETE
                      place:
                        href: "/places/4321"
                        method: GET
                      user-profile:
                        href: "/users/16180/profile"
                        method: GET
        '404':
          description: "User or place not found - Either the user or the specified place does not exist"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: USER_OR_PLACE_NOT_FOUND
                message: "User with ID 12345 or place with ID 4321 not found"
        '409':
          description: "Conflict - Place already in favorites"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: PLACE_ALREADY_FAVORITED
                message: "Place is already in user's favorites"
                details:
                  placeId: 4321
                  userId: 16180
