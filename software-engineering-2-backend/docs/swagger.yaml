          description: "Bad request - Missing or invalid required location parameters"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: INVALID_INPUT
                message: "User location with latitude and longitude is required"
  /admin/auth/generate-token:
    post:
      summary: "Generate admin token (development only)"
      operationId: generateAdminToken
      description: |
        Generates an admin JWT token for testing purposes. **This endpoint is only available in development mode (NODE_ENV=development) and should never be enabled in production.**

        In development, provide the admin test credentials to receive a temporary admin token.
      tags: [Admin]
      security: []   # No auth required, but disabled in production
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  description: "Development admin username (defaults to 'admin' if not overridden)"
                  example: admin
                password:
                  type: string
                  description: "Development admin password (defaults to 'admin123' if not overridden)"
                  example: admin123
      responses:
        '200':
          description: "Successfully generated admin token for development testing"
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: "JWT admin authentication token"
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  adminId:
                    type: integer
                    description: "Admin ID included in the token"
                    example: 1001
                  message:
                    type: string
                    example: "Admin token generated successfully (development only)"
                  expiresIn:
                    type: string
                    description: "How long the token is valid"
                    example: "24 hours"
                  usage:
                    type: string
                    description: "Instructions for using the token"
                    example: "Include this token in Authorization header as: Bearer <token>"
        '401':
          description: "Unauthorized - Invalid admin credentials"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: INVALID_CREDENTIALS
                message: "Invalid admin credentials for token generation."
        '403':
          description: "Forbidden - Endpoint not available in production"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: DISABLED_IN_PRODUCTION
                message: "Admin token generation endpoint is disabled in production."
  "/admin/{adminId}/places/{placeId}/reports":
    get:
      summary: "Get reports for a place (admin only)"
      operationId: getPlaceReports
      description: |
        **FR35 - The admin must be able to see reports of a place.**

        Retrieves all user reports filed for a specific place for administrative review and action.
      tags: [Admin]
      security: [{ adminAuth: [] }]
      parameters:
        - name: adminId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the administrator performing the operation for audit purposes"
        - name: placeId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the place whose reports are being retrieved for review"
      responses:
        '200':
          description: "Successfully retrieved all reports filed for the specified place"
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Report"
                        - type: object
                          properties:
                            links:
                              type: object
                              additionalProperties:
                                $ref: "#/components/schemas/HypermediaLink"
                              description: "Available actions for this report"
                              example:
                                place:
                                  href: "/places/4321"
                                  method: GET
                                edit-place:
                                  href: "/admin/1001/places/4321"
                                  method: PUT
                  totalReports:
                    type: integer
                    description: "Total number of reports for this place"
                    example: 5
                  links:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/HypermediaLink"
                    description: "Available actions for reports collection"
                    example:
                      self:
                        href: "/admin/1001/places/4321/reports"
                        method: GET
        '403':
          description: "Forbidden - Admin access required, invalid or missing authentication token"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: ACCESS_DENIED
                message: "Administrator access required for this operation"
                details:
                  requiredRole: admin
                  providedRole: user
        '404':
          description: "Place not found - No place exists with the specified placeId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: PLACE_NOT_FOUND
                message: "Place with ID 4321 not found"
  "/admin/{adminId}/places/{placeId}":
    put:
      summary: "Update place information (admin only)"
      operationId: updatePlace
      description: |
        **FR37 - The admin must be able to edit the information of a place.**

        Updates place information including details, category, location, and other attributes (admin only). (Note: ratings are not directly editable and are excluded.)
      tags: [Admin]
      security: [{ adminAuth: [] }]
      parameters:
        - name: adminId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the administrator performing the update operation for audit purposes"
        - name: placeId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the place whose information is being updated"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Place"
      responses:
        '200':
          description: "Place information successfully updated with the new data"
          content:
            application/json:
              schema:
                type: object
                properties:
                  place:
                    $ref: "#/components/schemas/Place"
                  links:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/HypermediaLink"
                    description: "Available actions for this edited place"
                    example:
                      self:
                        href: "/places/4321"
                        method: GET
                      edit:
                        href: "/admin/1001/places/4321"
                        method: PUT
                      reports:
                        href: "/admin/1001/places/4321/reports"
                        method: GET
        '403':
          description: "Forbidden - Admin access required, invalid or missing authentication token"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: ACCESS_DENIED
                message: "Administrator access required for this operation"
                details:
                  requiredRole: admin
                  providedRole: user
        '404':
          description: "Place not found - No place exists with the specified placeId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: PLACE_NOT_FOUND
                message: "Place with ID 4321 not found"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "User authentication using JWT token with userId, email, and role claims"
    adminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Admin authentication using JWT token. Requires role: admin claim in the JWT payload"
  schemas:
    User:
      type: object
      required: [userId, name, email, password]
      properties:
        userId:
          type: integer
          description: "Unique identifier for the user"
          example: 16180
        name:
          type: string
          description: "Full name of the user"
          example: "John Doe"
        email:
          type: string
          format: email
          description: "User's email address for authentication"
          example: john.doe@example.com
        password:
          type: string
          format: password
          writeOnly: true
          description: "User's password for authentication (never returned in responses, only accepted in requests)"
          example: SecurePass123!
        phone:
          type: string
          description: "User phone number"
          example: "+30 123 456 7890"
        dateOfBirth:
          type: string
          description: "User date of birth"
          example: "1990-01-15"
        role:
          type: string
          enum: [user, admin]
          default: user
          description: "User role in the system"
        activeProfile:
          type: integer
          description: "ID of the user's active preference profile"
          example: 4
        preferences:
          type: object
          description: "Legacy aggregate user preferences (used when not utilizing multiple profiles)"
          properties:
            categories:
              type: array
              items: 
                type: string
              description: "List of preferred categories (legacy field)"
              example: []
            tags:
              type: array
              items:
                type: string
              description: "List of preferred tags or keywords (legacy field)"
              example: []
        location:
          $ref: "#/components/schemas/Location"
          description: "User's saved or last known location (if any)"
        createdAt:
          type: string
          format: date-time
          description: "Account creation timestamp"
          example: "2025-11-28T12:00:00Z"
    PreferenceProfile:
      type: object
      required: [profileId, userId, name, categories]
      properties:
        profileId:
          type: integer
          description: "Unique identifier for the preference profile"
          example: 42
        userId:
          type: integer
          description: "ID of the user who owns this profile"
          example: 16180
        name:
          type: string
          description: "Name of the preference profile"
          example: "Cultural Explorer"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/PreferenceCategory"
          description: "List of selected preference categories for this profile"
          example: ["MUSEUM", "RESTAURANT", "CULTURE"]
        priceRange:
          type: string
          description: "Preferred price range for recommendations (if applicable)"
          example: "$$"
        # note: selectedPreferences/profileName are legacy aliases, not included here as separate fields in the profile object.
    PreferenceCategory:
      type: string
      description: "Possible categories for preferences and place classification"
      enum: [MUSEUM, BEACH, PARK, RESTAURANT, NIGHTLIFE, SHOPPING, SPORTS, CULTURE]
    Settings:
      type: object
      properties:
        userId:
          type: integer
          description: "ID of the user these settings belong to"
          example: 16180
        preferredLanguage:
          $ref: "#/components/schemas/Language"
          description: "Preferred language for the application interface. This is the primary field; 'language' is also accepted as a legacy alias for backward compatibility"
        language:
          $ref: "#/components/schemas/Language"
          deprecated: true
          description: "Legacy alias for preferredLanguage field. Both fields are supported in requests for backward compatibility, but preferredLanguage is preferred. When reading settings, preferredLanguage is always returned"
        emailNotifications:
          type: boolean
          description: "Whether email notifications are enabled"
          example: true
        pushNotifications:
          type: boolean
          description: "Whether push notifications are enabled"
          example: true
        accessibilitySettings:
          type: array
          items:
            $ref: "#/components/schemas/AccessibilityOption"
          description: "Array of accessibility features enabled by the user"
          example: [LARGE_TEXT]
        privacySettings:
          type: array
          items:
            $ref: "#/components/schemas/PrivacyOption"
          description: "Array of privacy preferences set by the user"
          example: [SHARE_LOCATION, ENABLE_NOTIFICATIONS]
        userAgreementAccepted:
          type: boolean
          description: "Whether the user has accepted the terms and conditions"
          example: true
    Language:
      type: string
      description: "Available languages for the application interface"
      enum: [ENGLISH, FRENCH, GERMAN, GREEK, ITALIAN, SPANISH]
    AccessibilityOption:
      type: string
      description: "Accessibility features available to users"
      enum: [HIGH_CONTRAST, LARGE_TEXT, TEXT_TO_SPEECH]
    PrivacyOption:
      type: string
      description: "Privacy settings that users can control"
      enum: [SHARE_LOCATION, ENABLE_NOTIFICATIONS, DATA_SHARING]
    Place:
      type: object
      required: [placeId, name]
      properties:
        placeId:
          type: integer
          description: "Unique identifier for the place"
          example: 4321
        name:
          type: string
          description: "Name of the place"
          example: "White Tower of Thessaloniki"
        description:
          type: string
          description: "Detailed description of the place"
          example: "The White Tower is a historical monument and museum in Thessaloniki, Greece. It is the city's most famous landmark and a symbol of its rich history."
        category:
          $ref: "#/components/schemas/PreferenceCategory"
        location:
          $ref: "#/components/schemas/Location"
          description: "Geographic location of the place with coordinates and address details"
        website:
          type: string
          format: uri
          description: "Official website URL"
          example: "https://www.lpth.gr"
        rating:
          type: number
          format: float
          minimum: 0
          maximum: 5
          description: "Average rating of the place"
          example: 4.7
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/Review"
          description: "List of reviews for this place"
        createdAt:
          type: string
          format: date-time
          description: "Place creation timestamp"
    Location:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
          description: "Latitude coordinate in decimal degrees"
          example: 37.9688
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
          description: "Longitude coordinate in decimal degrees"
          example: 23.7281
        address:
          type: string
          description: "Street address of the location"
          example: "Leoforos Nikis"
        city:
          type: string
          description: "City where the location is situated"
          example: Thessaloniki
        country:
          type: string
          description: "Country where the location is situated"
          example: Greece
        postalCode:
          type: string
          description: "Postal/ZIP code of the location"
          example: "54640"
    FavouritePlace:
      type: object
      properties:
        favouriteId:
          type: integer
          description: "Unique identifier for the favourite entry"
          example: 789
        placeId:
          type: integer
          description: "ID of the favourited place"
          example: 4321
        place:
          $ref: "#/components/schemas/Place"
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/Review"
          description: "Reviews for this place"
    DislikedPlace:
      type: object
      properties:
        dislikedId:
          type: integer
          description: "Unique identifier for the disliked entry"
          example: 456
        placeId:
          type: integer
          description: "ID of the disliked place"
          example: 4321
        place:
          $ref: "#/components/schemas/Place"
    Review:
      type: object
      required: [reviewId, userId, placeId, rating]
      properties:
        reviewId:
          type: integer
          description: "Unique identifier for the review"
          example: 7853
        userId:
          type: integer
          description: "ID of the user who wrote the review"
          example: 16180
        placeId:
          type: integer
          description: "ID of the place being reviewed"
          example: 4321
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: "Star rating given to the place (1-5 stars)"
          example: 5
        comment:
          type: string
          description: "Optional text comment from the reviewer"
          example: "The White Tower is a must-visit! The view from the top is breathtaking and the museum inside is very informative."
        createdAt:
          type: string
          format: date-time
          description: "Timestamp when the review was created"
          example: "2025-05-15T14:30:00Z"
    Report:
      type: object
      required: [reportId, userId, placeId, description]
      properties:
        reportId:
          type: integer
          description: "Unique identifier for the report"
          example: 824
        userId:
          type: integer
          description: "ID of the user who filed the report"
          example: 16180
        placeId:
          type: integer
          description: "ID of the place being reported"
          example: 4321
        description:
          type: string
          description: "Detailed description of the issue being reported"
          example: "The opening hours listed are incorrect. The place is actually closed on Sundays."
        status:
          type: string
          enum: [PENDING, REVIEWED, RESOLVED]
          default: PENDING
          description: "Current status of the report processing"
        createdAt:
          type: string
          format: date-time
          description: "Timestamp when the report was filed"
          example: "2025-05-20T09:15:00Z"
        resolvedAt:
          type: string
          format: date-time
          description: "Timestamp when the report was resolved"
    NavigationRoute:
      type: object
      properties:
        startPoint:
          $ref: "#/components/schemas/Location"
        endPoint:
          $ref: "#/components/schemas/Location"
        transportationMode:
          $ref: "#/components/schemas/TransportationMode"
        estimatedTime:
          type: integer
          description: "Estimated time in minutes"
          example: 25
        distance:
          type: number
          format: float
          description: "Distance in kilometers"
          example: 2.3
      example:
        startPoint:
          latitude: 40.6279
          longitude: 22.9584
          address: "Aristotle University of Thessaloniki"
          city: Thessaloniki
          country: Greece
        endPoint:
          latitude: 40.6264
          longitude: 22.9484
          address: "White Tower of Thessaloniki"
          city: Thessaloniki
          country: Greece
        transportationMode: WALKING
        estimatedTime: 25
        distance: 2.3
    TransportationMode:
      type: string
      description: "Available modes of transportation for navigation"
      enum: [WALKING, DRIVING, PUBLIC_TRANSPORT]
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: "Machine-readable error code for programmatic handling"
          example: USER_NOT_FOUND
        message:
          type: string
          description: "Human-readable error message describing the issue"
          example: "User with ID 12345 not found"
        details:
          type: object
          description: "Optional additional error details and context"
          additionalProperties: true
          example:
            field: userId
            value: 12345
            timestamp: "2025-06-01T10:30:00Z"
    HypermediaLink:
      type: object
      properties:
        href:
          type: string
          description: "URI of the related resource"
        method:
          type: string
          enum: [GET, POST, PUT, DELETE, PATCH]
          description: "HTTP method for the link"
tags:
  - name: "API Information"
    description: "Root endpoints for API discovery, health checks, and system information"
  - name: Authentication
    description: "User authentication and registration"
  - name: "User Management"
    description: "User profile and settings management"
  - name: Preferences
    description: "Create and manage multiple preference profiles for different travel scenarios and personalized recommendations"
  - name: Recommendations
    description: "Personalized place recommendations based on user preferences and location"
  - name: Places
    description: "Place information, reviews, reports, and search functionality"
  - name: "Favourite & Disliked Places"
    description: "Curate personal favorites and exclude unwanted places to enhance recommendations"
  - name: Navigation
    description: "Turn-by-turn navigation services."
  - name: Admin
    description: "Administrative operations for report handling and place management"
