openapi: 3.0.3
info:
  title: "myWorld Travel API"
  description: |
    ## 🔗 **HATEOAS Architecture (REST Level 3)**
    This API implements **Hypermedia As The Engine Of Application State (HATEOAS)** following REST Level 3 architectural constraints:
    - **Dynamic Navigation**: Every response includes discoverable links to related resources and available actions
    - **Self-Descriptive**: Clients can navigate the API entirely through hypermedia links without hardcoding URLs
    - **Stateless Interaction**: All possible actions are dynamically provided based on current resource state

    Each resource response includes a `links` object containing:
    - Available HTTP methods and URIs for resource operations
    - Navigation paths to connected entities  
    - Self-reference links to the current resource

    **Important**: Link availability is dynamic and depends on the current resource state, user permissions, and context. The examples show typical links but actual responses may include additional or fewer links based on the specific situation.

    ---
    🌍 **myWorld Travel API** - Your intelligent travel companion for discovering the world!

    A comprehensive RESTful API that powers personalized travel experiences through smart recommendations and community-driven insights.

    ### 🚀 **Key Features**
    - **AI-Powered Recommendations**: Intelligent place suggestions based on your preferences, location, and travel history
    - **Multi-Profile Support**: Create unlimited preference profiles for different travel moods (business, leisure, adventure, culture)
    - **Real-Time Location Services**: Get instant recommendations based on your current location
    - **Community Reviews**: Read authentic reviews and contribute your own experiences
    - **Smart Navigation**: Turn-by-turn directions with multiple transportation options
    
    ### 👤 **User Management**
    - Complete profile management with customizable personal information
    - Multi-language support (English, French, German, Greek, Italian, Spanish)
    - Comprehensive accessibility options (high contrast, large text, text-to-speech)
    - Granular privacy controls for location sharing and data preferences
    - Seamless profile switching for different travel scenarios

    ### 🎯 **Intelligent Discovery System**
    - Create and manage multiple preference profiles
    - AI-powered recommendations based on location and interests
    - Support for 8 diverse categories: Museum, Beach, Park, Restaurant, Nightlife, Shopping, Sports, and Culture
    - Real-time location-based suggestions

    ### 🌟 **Social & Community Features**
    - Comprehensive review system with 5-star ratings and detailed comments
    - Manage favorite and disliked places to improve future recommendations
    - Report incorrect or outdated information to maintain data quality
    - Community-driven content validation and moderation system
    - Share experiences and help fellow travelers make informed decisions

    ### 🔍 **Advanced Search & Navigation**
    - Powerful keyword-based place search with advanced filtering options
    - Turn-by-turn navigation with support for walking, driving, and public transport
    - Integration with leading mapping services for accurate and up-to-date directions
    - Estimated travel times and distance calculations

    ### 🛡️ **Administrative Tools**
    - Comprehensive content management and moderation capabilities
    - Streamlined report handling and resolution workflows
    - Admin dashboard for monitoring system health and user engagement

    ---
  version: "1.6.2"
  contact:
    name: "myWorld API Support Team"
    email: api-support@myworld.com
    url: "https://myworld.com/support"
  license:
    name: "Apache License 2.0"
    url: "https://www.apache.org/licenses/LICENSE-2.0"
servers:
  - url: "https://860d5886-4cd1-42e5-8777-f4ccfda73c0e.mock.pstmn.io"
    description: "Staging server for development and testing"
  - url: "https://api.myworld.com/v1"
    description: "Production server for live API access"
paths:
  "/":
    get:
      summary: "API information and entry point"
      operationId: getApiInfo
      description: |
        Root endpoint providing API information and HATEOAS links for API discovery. Returns version information and important resource links.
      tags: ["API Information"]
      security: []   # Public endpoint
      responses:
        '200':
          description: "Successfully retrieved API information with discoverable links"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "🌍 Welcome to myWorld Travel API"
                  version:
                    type: string
                    example: "1.6.2"
                  description:
                    type: string
                    example: "RESTful API with HATEOAS support for personalized travel experiences"
                  documentation:
                    type: string
                    example: "/api-docs"
                  links:
                    type: object
                    additionalProperties:
                      $ref: '#/components/schemas/HypermediaLink'
                    description: "Key API entry points"
                    example:
                      api-info:
                        href: /
                        method: GET
                      users:
                        href: "/users/{userId}/profile"
                        method: GET
                        templated: true
                      places:
                        href: "/places/{placeId}"
                        method: GET
                        templated: true
                      search:
                        href: "/places/search{?keywords}"
                        method: GET
                        templated: true
                      navigation:
                        href: "/navigation{?userLatitude,userLongitude,placeLatitude,placeLongitude,transportationMode}"
                        method: GET
  /health:
    get:
      summary: "Health check endpoint"
      operationId: healthCheck
      description: |
        Simple health check endpoint for monitoring and uptime probes. Returns basic status and uptime information.
      tags: ["API Information"]
      security: []   # Public
      responses:
        '200':
          description: "Service is healthy and operational"
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time
                    example: "2025-11-28T10:30:00Z"
                  uptime:
                    type: number
                    description: "Process uptime in seconds"
                    example: 3600
  /auth/login:
    post:
      summary: "User login"
      operationId: login
      description: |
        Authenticates a user with email and password credentials and returns a JWT token for subsequent API requests.
      tags: [Authentication]
      security: []   # No auth required
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  description: "User email address"
                  example: john.doe@example.com
                password:
                  type: string
                  format: password
                  description: "User password"
                  example: SecurePass123!
      responses:
        '200':
          description: "Successfully authenticated and JWT token generated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: "Success message"
                    example: "Login successful"
                  token:
                    type: string
                    description: "JWT authentication token for API access"
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." 
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: "Bad request - Missing required fields"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: VALIDATION_ERROR
                message: "Email and password are required"
        '401':
          description: "Unauthorized - Invalid email or password"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: AUTHENTICATION_ERROR
                message: "Invalid email or password"
  /auth/signup:
    post:
      summary: "User registration"
      operationId: signup
      description: |
        Creates a new user account with name, email, and password. Returns a JWT token for immediate access.
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  description: "Full name of the user"
                  example: "John Doe"
                email:
                  type: string
                  format: email
                  description: "User email address (must be unique)"
                  example: john.doe@example.com
                password:
                  type: string
                  format: password
                  description: "User password (minimum 6 characters)"
                  example: SecurePass123!
      responses:
        '201':
          description: "User account successfully created and JWT token generated"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: "Success message"
                    example: "Registration successful"
                  token:
                    type: string
                    description: "JWT authentication token for API access"
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: "Bad request - Invalid input data or missing required fields"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: VALIDATION_ERROR
                message: "Password must be at least 6 characters long"
                details:
                  field: password
        '409':
          description: "Conflict - Email already registered"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: CONFLICT
                message: "User with this email already exists"
                details:
                  field: email
  "/users/{userId}/profile":
    get:
      summary: "Get user profile information"
      operationId: getUserProfile
      description: |
        **FR41 - The user must be able to access their profile information.**

        Retrieves comprehensive profile information for a specific user including personal details and active preference profile.
      tags: ["User Management"]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the user whose profile information is being requested"
      responses:
        '200':
          description: "Successfully retrieved user profile information with complete details"
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  links:
                    type: object
                    additionalProperties:
                      $ref: '#/components/schemas/HypermediaLink'
                    description: "Available actions and related resources"
                    example:
                      self:
                        href: "/users/16180/profile"
                        method: GET
                      edit:
                        href: "/users/16180/profile"
                        method: PUT
                      settings:
                        href: "/users/16180/settings"
                        method: GET
                      preference-profiles:
                        href: "/users/16180/preference-profiles"
                        method: GET
                      create-profile:
                        href: "/users/16180/preference-profiles"
                        method: POST
                      recommendations:
                        href: "/users/16180/recommendations{?latitude,longitude,maxDistance}"
                        method: GET
                      favourites:
                        href: "/users/16180/favourite-places"
                        method: GET
        '403':
          description: "Forbidden - Authenticated user cannot access this userId resource"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: ACCESS_DENIED
                message: "You can only access your own resources"
        '404':
          description: "User not found - No user exists with the specified userId"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: USER_NOT_FOUND
                message: "User with ID 12345 not found"
    put:
      summary: "Update user profile information"
      operationId: updateUserProfile
      description: |
        **FR6 - The user must be able to switch between preference profiles.**

        Updates user profile information including active preference profile selection. Only allowed for the authenticated user themselves.
      tags: ["User Management"]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the user whose profile is being updated"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: "User profile successfully updated with the new information"
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  links:
                    type: object
                    additionalProperties:
                      $ref: '#/components/schemas/HypermediaLink'
                    description: "Available actions for this user profile"
                    example:
                      self:
                        href: "/users/16180/profile"
                        method: GET
                      edit:
                        href: "/users/16180/profile"
                        method: PUT
                      settings:
                        href: "/users/16180/settings"
                        method: GET
                      preference-profiles:
                        href: "/users/16180/preference-profiles"
                        method: GET
                      recommendations:
                        href: "/users/16180/recommendations{?latitude,longitude,maxDistance}"
                        method: GET
        '403':
          description: "Forbidden - Authenticated user cannot access this userId resource"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: ACCESS_DENIED
                message: "You can only access your own resources"
        '404':
          description: "User not found - No user exists with the specified userId"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: USER_NOT_FOUND
                message: "User with ID 12345 not found"
        '409':
          description: "Conflict - Email already in use by another account"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: CONFLICT
                message: "Email is already in use by another account"
                details:
                  field: email
  "/users/{userId}/settings":
    get:
      summary: "Get user settings"
      operationId: getSettings
      description: |
        **FR28 - The user must be able to access the settings.**

        Retrieves user's application settings including language preferences, accessibility options, and privacy configurations.
      tags: ["User Management"]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the user whose settings are being retrieved"
      responses:
        '200':
          description: "Successfully retrieved user settings with all configured preferences"
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    $ref: '#/components/schemas/Settings'
                  links:
                    type: object
                    additionalProperties:
                      $ref: '#/components/schemas/HypermediaLink'
                    description: "Available actions for user settings"
                    example:
                      self:
                        href: "/users/16180/settings"
                        method: GET
                      update:
                        href: "/users/16180/settings"
                        method: PUT
                      user-profile:
                        href: "/users/16180/profile"
                        method: GET
        '404':
          description: "User not found - No user exists with the specified userId"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: USER_NOT_FOUND
                message: "User with ID 12345 not found"
    put:
      summary: "Update user settings"
      operationId: updateSettings
      description: |
        **FR40 - The user must be able to modify their settings.**

        Updates user's application settings including language, accessibility, and privacy preferences.
      tags: ["User Management"]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the user whose settings are being updated"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Settings'
      responses:
        '200':
          description: "Settings successfully updated with the new configuration"
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    $ref: '#/components/schemas/Settings'
                  links:
                    type: object
                    additionalProperties:
                      $ref: '#/components/schemas/HypermediaLink'
                    description: "Available actions for user settings"
                    example:
                      self:
                        href: "/users/16180/settings"
                        method: GET
                      update:
                        href: "/users/16180/settings"
                        method: PUT
                      user-profile:
                        href: "/users/16180/profile"
                        method: GET
        '404':
          description: "User not found - No user exists with the specified userId"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: USER_NOT_FOUND
                message: "User with ID 12345 not found"
  "/users/{userId}/preference-profiles":
    get:
      summary: "Get all preference profiles for a user"
      operationId: getPreferenceProfiles
      description: |
        **FR2 - The user must be able to view their preference profiles.**

        Retrieves all preference profiles created by the user, including their names and selected categories.
      tags: [Preferences]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the user whose preference profiles are being retrieved"
      responses:
        '200':
          description: "Successfully retrieved list of all preference profiles for the user"
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items:
                      $ref: '#/components/schemas/PreferenceProfile'
                  links:
                    type: object
                    additionalProperties:
                      $ref: '#/components/schemas/HypermediaLink'
                    description: "Available actions for preference profiles collection"
                    example:
                      self:
                        href: "/users/16180/preference-profiles"
                        method: GET
                      create-profile:
                        href: "/users/16180/preference-profiles"
                        method: POST
                      user-profile:
                        href: "/users/16180/profile"
                        method: GET
        '404':
          description: "User not found - No user exists with the specified userId"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: USER_NOT_FOUND
                message: "User with ID 12345 not found"
    post:
      summary: "Create a new preference profile for a user"
      operationId: createPreferenceProfile
      description: |
        **FR3 - The user must be able to create preference profiles.**

        **FR4 - The user must be able to set their preferences for a profile.**

        Creates a new preference profile with selected categories for personalized recommendations. Returns all user profiles including the newly created one.
      tags: [Preferences]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the user for whom the preference profile is being created"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categories]
              properties:
                name:
                  type: string
                  description: "Custom name for the preference profile to help identify its purpose"
                  example: "Cultural Explorer"
                categories:
                  type: array
                  items:
                    $ref: "#/components/schemas/PreferenceCategory"
                  uniqueItems: true
                  description: "Array of preference categories that define this profile's interests"
                  example: [MUSEUM, RESTAURANT, CULTURE]
                selectedPreferences:
                  type: array
                  items:
                    $ref: "#/components/schemas/PreferenceCategory"
                  uniqueItems: true
                  description: "Legacy alias for categories field"
                  example: [MUSEUM, RESTAURANT, CULTURE]
                  deprecated: true
                profileName:
                  type: string
                  description: "Legacy alias for name field"
                  deprecated: true
                  example: "Cultural Explorer"
      responses:
        '201':
          description: "Preference profile successfully created with the specified settings. Returns all user profiles including the newly created one."
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items:
                      $ref: "#/components/schemas/PreferenceProfile"
                    description: "All preference profiles for this user including the newly created one"
                  links:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/HypermediaLink"
                    description: "Available actions for preference profiles"
                    example:
                      self:
                        href: "/users/16180/preference-profiles"
                        method: GET
                      create-profile:
                        href: "/users/16180/preference-profiles"
                        method: POST
                      user-profile:
                        href: "/users/16180/profile"
                        method: GET
        '400':
          description: "Bad request - Missing or invalid profile data"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: INVALID_PROFILE_DATA
                message: "No preferences selected"
                details:
                  field: categories
                  value: []
                  reason: "At least one preference category must be selected"
        '404':
          description: "User not found - No user exists with the specified userId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: USER_NOT_FOUND
                message: "User with ID 12345 not found"
  "/users/{userId}/preference-profiles/{profileId}":
    put:
      summary: "Update a specific preference profile"
      operationId: updatePreferenceProfile
      description: |
        **FR5 - The user must be able to edit their preference profiles.**

        Updates an existing preference profile with new categories and/or profile name. Returns all user profiles.
      tags: [Preferences]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the user who owns the preference profile"
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the preference profile to be updated"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferenceProfile'
      responses:
        '200':
          description: "Preference profile successfully updated with the new settings. Returns all user profiles."
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items:
                      $ref: "#/components/schemas/PreferenceProfile"
                  links:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/HypermediaLink"
                    description: "Available actions for this user's preference profiles"
                    example:
                      self:
                        href: "/users/16180/preference-profiles"
                        method: GET
                      create-profile:
                        href: "/users/16180/preference-profiles"
                        method: POST
                      recommendations:
                        href: "/users/16180/recommendations{?latitude,longitude}"
                        method: GET
                      user-profile:
                        href: "/users/16180/profile"
                        method: GET
        '400':
          description: "Bad request - Invalid profile data"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: INVALID_PROFILE_DATA
                message: "No preferences selected"
                details:
                  field: categories
                  value: []
                  reason: "At least one preference category must be selected"
        '404':
          description: "User or profile not found - Either the user or the specified profile does not exist"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: PROFILE_NOT_FOUND
                message: "Profile with ID 42 not found for user 12345"
        # Note: No 409 documented here because current implementation allows deleting active/last profiles.
    delete:
      summary: "Delete a specific preference profile"
      operationId: deletePreferenceProfile
      description: |
        **FR5 - The user must be able to edit their preference profiles.**

        Deletes a preference profile. **Note**: The current implementation allows deleting any profile (even the active or last profile). If the active profile is deleted, the user's `activeProfile` setting may point to a non-existent profile until changed.
      tags: [Preferences]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the user who owns the preference profile"
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the preference profile to be deleted"
      responses:
        '204':
          description: "Preference profile successfully deleted with no content returned"
        '404':
          description: "User or profile not found - Either the user or the specified profile does not exist"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: PROFILE_NOT_FOUND
                message: "Profile with ID 42 not found for user 12345"
        # The spec no longer lists 409, since deletion restrictions are not enforced in code.
  "/users/{userId}/preference-profiles/{profileId}/activate":
    post:
      summary: "Activate a specific preference profile"
      operationId: activatePreferenceProfile
      description: |
        **FR5 - The user must be able to edit their preference profiles.**

        Activates a specific preference profile, making it the active profile for recommendations. Returns all user profiles with the `activeProfile` field indicating which profile is now active.
      tags: [Preferences]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the user who owns the preference profiles"
        - name: profileId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the preference profile to be activated"
      responses:
        '200':
          description: "Preference profile successfully activated. Returns all profiles with activeProfile indicator."
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items:
                      $ref: "#/components/schemas/PreferenceProfile"
                  activeProfile:
                    type: integer
                    description: "ID of the newly activated profile"
                    example: 42
                  message:
                    type: string
                    description: "Confirmation message"
                    example: "Profile activated successfully"
                  links:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/HypermediaLink"
                    description: "Available actions after activation"
                    example:
                      self:
                        href: "/users/16180/preference-profiles"
                        method: GET
                      recommendations:
                        href: "/users/16180/recommendations{?latitude,longitude}"
                        method: GET
                      user-profile:
                        href: "/users/16180/profile"
                        method: GET
        '404':
          description: "User or profile not found - Either the user or the specified profile does not exist"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: PROFILE_NOT_FOUND
                message: "Profile with ID 42 not found for user 12345"
  "/users/{userId}/recommendations":
    get:
      summary: "Get personalized recommendations for a user"
      operationId: getRecommendations
      description: |
        **FR7 - The system must provide place recommendations based on the user's preferences and location.**

        **FR8 - The user must be able to view recommended places.**

        **FR39 - The system must be able to access the user's location.**

        Generates personalized place recommendations based on the user's active preference profile and optional current location. When no preference profiles exist, returns an empty recommendations array with a message prompting the user to create a profile.
      tags: [Recommendations]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the user for whom recommendations are being generated"
        - name: latitude
          in: query
          required: false
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
          description: "Current latitude for location-based filtering and distance calculation"
        - name: longitude
          in: query
          required: false
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
          description: "Current longitude for location-based filtering and distance calculation"
        - name: maxDistance
          in: query
          required: false
          schema:
            type: number
            format: float
            minimum: 0
          description: "Maximum distance in kilometers for filtering recommendations (only used when lat/lon provided)"
      responses:
        '200':
          description: "Successfully generated personalized recommendations based on user preferences and location. Returns activeProfile field containing the name of the profile used for recommendations. May include message field when no profiles exist."
          content:
            application/json:
              schema:
                type: object
                properties:
                  recommendations:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Place"
                        - type: object
                          properties:
                            distance:
                              type: number
                              format: float
                              description: "Distance in kilometers from user location (only present when latitude/longitude provided)"
                            links:
                              type: object
                              additionalProperties:
                                $ref: "#/components/schemas/HypermediaLink"
                              description: "Available actions for this place recommendation"
                              example:
                                select:
                                  href: "/places/4321"
                                  method: GET
                  activeProfile:
                    type: string
                    description: "Name of the preference profile used to generate these recommendations"
                    example: "Cultural Explorer"
                  message:
                    type: string
                    description: "Informational message when no recommendations available (e.g., no preference profiles)"
                    example: "Δημιουργήστε ένα προφίλ προτιμήσεων για να δείτε προτάσεις"
                  links:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/HypermediaLink"
                    description: "Available actions for recommendations"
                    example:
                      refresh:
                        href: "/users/16180/recommendations{?latitude,longitude,maxDistance}"
                        method: GET
                      user-profile:
                        href: "/users/16180/profile"
                        method: GET
        '404':
          description: "User not found - No user exists with the specified userId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: USER_NOT_FOUND
                message: "User with ID 12345 not found"
  "/places/{placeId}":
    get:
      summary: "Get details of a specific place"
      operationId: getPlace
      description: |
        **FR10 - The user must be able to select a place.**

        **FR12 - The user should be able to open the website of a selected place.**

        **FR13 - The user should be able to read a description of a selected place.**

        Retrieves comprehensive information about a specific place including description, location, website, and reviews. Publicly accessible.
      tags: [Places]
      security: []   # Public (no auth required to get place details)
      parameters:
        - name: placeId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the place whose details are being requested"
      responses:
        '200':
          description: "Successfully retrieved complete place information including all details and reviews"
          content:
            application/json:
              schema:
                type: object
                properties:
                  place:
                    $ref: "#/components/schemas/Place"
                  links:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/HypermediaLink"
                    description: "Available actions for this place"
                    example:
                      self:
                        href: "/places/4321"
                        method: GET
                      see-reviews:
                        href: "/places/4321/reviews"
                        method: GET
                      add-review:
                        href: "/places/4321/reviews"
                        method: POST
                      add-report:
                        href: "/places/4321/reports"
                        method: POST
                      navigation:
                        href: "/navigation{?userLatitude,userLongitude,placeLatitude,placeLongitude,transportationMode}"
                        method: GET
                      add-to-favourites:
                        href: "/users/{userId}/favourite-places"
                        method: POST
                      add-to-disliked:
                        href: "/users/{userId}/disliked-places"
                        method: POST
                      website:
                        href: "https://www.lpth.gr"
                        method: GET
                        type: text/html
                      user-profile:
                        href: "/users/16180/profile"
                        method: GET
        '404':
          description: "Place not found - No place exists with the specified placeId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: PLACE_NOT_FOUND
                message: "Place with ID 4321 not found"
  "/places/{placeId}/reviews":
    get:
      summary: "Get reviews for a place"
      operationId: getReviews
      description: |
        **FR33 - The user should be able to read reviews for a place.**

        Retrieves all reviews for the specified place. Always returns an array (which may be empty if no reviews yet).
      tags: [Places]
      security: []   # Public (reading reviews is open)
      parameters:
        - name: placeId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the place whose reviews are being requested"
      responses:
        '200':
          description: "Successfully retrieved all reviews for the specified place"
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items:
                      $ref: "#/components/schemas/Review"
                  links:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/HypermediaLink"
                    description: "Available actions for reviews collection"
                    example:
                      self:
                        href: "/places/4321/reviews"
                        method: GET
                      add-review:
                        href: "/places/4321/reviews"
                        method: POST
                      place:
                        href: "/places/4321"
                        method: GET
                      user-profile:
                        href: "/users/16180/profile"
                        method: GET
        '404':
          description: "Place not found - No place exists with the specified placeId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: PLACE_NOT_FOUND
                message: "Place with ID 4321 not found"
    post:
      summary: "Add a review for a place"
      operationId: submitReview
      description: |
        **FR32 - The user must be able to upload a review for a place.**

        Submits a new review with rating and optional comment for a specific place. The `userId` is extracted from the JWT token (the authenticated user creating the review).
      tags: [Places]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: placeId
          in: path
          required: true
          schema:
            type: integer
          description: "Unique identifier of the place being reviewed"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  description: "Star rating for the place on a scale of 1 to 5 stars"
                comment:
                  type: string
                  maxLength: 500
                  description: "Optional detailed review comment describing the user's experience. HTML tags are automatically stripped for security. Maximum 500 characters."
      responses:
        '201':
          description: "Review successfully submitted and added to the place's review collection"
          content:
            application/json:
              schema:
                type: object
                properties:
                  review:
                    $ref: "#/components/schemas/Review"
                  links:
                    type: object
                    additionalProperties:
                      $ref: "#/components/schemas/HypermediaLink"
                    description: "Available actions after submitting a review"
                    example:
                      self:
                        href: "/places/4321/reviews"
                        method: GET
                      place:
                        href: "/places/4321"
                        method: GET
                      user-profile:
                        href: "/users/16180/profile"
                        method: GET
        '400':
          description: "Bad request - Missing or invalid required fields"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: INVALID_REVIEW_DATA
                message: "Missing required rating"
                details:
                  field: rating
                  reason: "Rating is required to submit a review"
        '404':
          description: "Place not found - No place exists with the specified placeId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: PLACE_NOT_FOUND
                message: "Place with ID 4321 not found"
  "/places/{placeId}/reports":
    post:
      summary: "Report an issue with a place"
      operationId: createReport
      description: |
        **FR34 - The user should be able to report incorrect information.**

        Submits a report about incorrect or outdated information for a specific place. The `userId` is extracted from the JWT token.
